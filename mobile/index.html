<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0b1020">
<title>걸음지기 — 청각 보행 보조</title>
<link rel="manifest" href="manifest.webmanifest">
<style>
  :root{--bg:#0b1020;--fg:#e8ecff;--muted:#8ea0c8;--l1:#e01e1e;--l2:#e07814;--l3:#d2b400;--l4:#7a7a7a;--accent:#22c3ff}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--fg);font-family:-apple-system,"Malgun Gothic",system-ui,sans-serif}
  #wrap{position:fixed;inset:0;display:flex;flex-direction:column}
  #stage{position:relative;flex:1;overflow:hidden;background:#000}
  #cam{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  #ov{position:absolute;inset:0;width:100%;height:100%}
  #caption{position:absolute;left:0;right:0;bottom:0;padding:18px 12px;font-size:8vw;font-weight:800;
    text-align:center;color:#fff;background:rgba(0,0,0,.55);min-height:1.4em;letter-spacing:.02em;
    text-shadow:0 2px 6px #000;transition:background .15s}
  #hud{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;
    padding:10px 12px;font-size:13px;color:var(--muted);background:linear-gradient(#000a,transparent)}
  #bar{display:flex;gap:8px;padding:10px;background:#0e1530;align-items:center;flex-wrap:wrap}
  button{font-size:16px;font-weight:700;padding:12px 16px;border-radius:12px;border:0;color:#fff;background:#1c2a55}
  button.go{background:var(--accent);color:#001526;flex:1}
  button.stop{background:#3a1030}
  .seg{display:flex;background:#0a1230;border-radius:12px;overflow:hidden}
  .seg button{background:transparent;border-radius:0;padding:12px 14px}
  .seg button.on{background:#24407a}
  #status{font-size:13px;color:var(--muted);padding:10px 4px}
  .chip{padding:6px 10px;border-radius:8px;background:#132043;color:var(--accent);font-weight:700;font-size:14px}
  a{color:var(--accent)}
  /* 단순 UI: 화면 전체 탭 + 설정 숨김 */
  #stage{cursor:pointer}
  #gear{position:absolute;top:12px;right:12px;z-index:30;width:56px;height:56px;border-radius:50%;
    background:#000a;color:#fff;font-size:26px;border:0}
  #hint{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;background:var(--bg);gap:18px;padding:26px;z-index:15;pointer-events:none}
  #hintMain{font-size:10vw;font-weight:800;color:#fff;line-height:1.25}
  #hint small{font-size:5vw;color:var(--muted);font-weight:600;line-height:1.6}
  #settings{position:fixed;inset:0;z-index:80;background:var(--bg);overflow-y:auto;display:none;padding:16px}
  #settings.open{display:block}
  #settings h2{font-size:22px;margin:6px 0 16px}
  #settings .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
</style>
</head>
<body>
<div id="wrap">
  <div id="stage" role="button" tabindex="0" aria-label="시작 또는 정지. 화면을 누르세요">
    <video id="cam" playsinline muted></video>
    <canvas id="ov"></canvas>
    <div id="hud"><span id="fps">–</span><span id="mode">국내</span><span id="mv">–</span></div>
    <div id="caption"></div>
    <div id="hint"><span id="hintMain">화면을 눌러 시작</span>
      <small>화면 아무 곳이나 누르면 시작하고,<br>다시 누르면 멈춥니다.<br>오른쪽 위 ⚙ 는 설정입니다.</small></div>
    <button id="gear" aria-label="설정 열기">⚙</button>
    <div id="aiDbg" style="position:absolute;top:14px;left:14px;z-index:25;font-size:13px;color:#bcd;background:#0009;padding:6px 10px;border-radius:8px;max-width:70%;display:none"></div>
  </div>

  <div id="settings" role="dialog" aria-label="설정">
    <h2>설정</h2>
    <div class="row">
      <button id="start" class="go">▶ 시작</button>
      <button id="stopb" class="stop" style="display:none">■ 정지</button>
      <button id="sound">🔊 소리 테스트</button>
    </div>
    <div class="row"><span class="chip">인식 모드</span>
      <div class="seg" id="modeSeg">
        <button data-mode="coco">빠름</button>
        <button data-mode="seg">정밀 보행로</button>
        <button data-mode="wg" class="on">국내모델</button>
        <button data-mode="ai">AI 설명</button>
      </div>
    </div>
    <div class="row" style="flex-direction:column;align-items:stretch">
      <span class="chip">AI 백엔드 (선택)</span>
      <input id="aiUrl" placeholder="AI 백엔드 주소 https://...workers.dev" style="padding:12px;border-radius:10px;border:0;background:#0a1230;color:#fff;font-size:14px">
      <input id="aiToken" placeholder="AI 토큰(WG_TOKEN, 선택)" style="padding:12px;border-radius:10px;border:0;background:#0a1230;color:#fff;font-size:14px;margin-top:6px">
    </div>
    <div class="row">
      <button id="dangerBtn" style="background:#7a2030">위험만</button>
      <button id="navBtn">내비 OFF</button>
    </div>
    <div class="row">
      <button id="geoBtn">위치안내 OFF</button>
      <button id="poiAdd">여기 지점</button>

    </div>
    <div class="row">
      <button id="depthBtn">깊이(실험)</button>

    <button id="settingsClose" class="go" style="width:100%;margin-top:14px;padding:18px;font-size:18px">닫기</button>
  </div>
</div>

<!-- WebXR 깊이 세션용 화면 오버레이(자막) -->
<div id="xrOverlay" style="display:none;position:fixed;inset:0;pointer-events:none;z-index:50">
  <div id="xrDiag" style="position:absolute;top:14px;left:14px;font-size:13px;color:#bcd;background:#0009;padding:6px 10px;border-radius:8px"></div>
  <div id="xrCap" style="position:absolute;left:0;right:0;bottom:12%;text-align:center;font-size:9vw;font-weight:800;color:#fff;padding:16px;text-shadow:0 2px 8px #000"></div>
  <button id="xrEnd" style="position:absolute;top:14px;right:14px;pointer-events:auto;font-size:16px;font-weight:700;padding:10px 16px;border-radius:10px;border:0;background:#3a1030;color:#fff">종료</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/deeplab@0.2.1/dist/deeplab.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.20.1/dist/ort.webgpu.min.js"></script>
<script src="wg_onnx.js"></script>
<script src="walk_logic.js"></script>
<script>
const $ = s => document.querySelector(s);
const video = $("#cam"), ov = $("#ov"), octx = ov.getContext("2d");
const captionEl = $("#caption"), statusEl = $("#status");
const L = window.WalkLogic;
const engine = new L.WalkingRiskEngine();
const scheduler = new L.AlertScheduler();
const tracker = new L.Tracker();
const navGuide = new L.NavigationGuide();
let navOn = false;
let dangerOnly = true;   // 기본: 위험요소만 (길안내·참고·부정확한 계단 등 억제)

let mode = "wg";              // 기본=국내모델 (coco | seg | wg)
let cocoModel = null, segModel = null, wgModel = null;
// AI 설명 모드 (백엔드 경유, 키는 서버에만)
let aiUrl = localStorage.getItem("wgAiUrl") || "", aiToken = localStorage.getItem("wgAiToken") || "";
let lastAI = 0, aiBusy = false; const AI_INTERVAL = 2800;
const aiCooldown = new Map();
const aiCanvas = document.createElement("canvas"), aictx = aiCanvas.getContext("2d");
let aiAudioEl = null;
function playAiAudio(b64){ try{ if(aiAudioEl) aiAudioEl.pause(); aiAudioEl = new Audio("data:audio/mp3;base64,"+b64); aiAudioEl.play().catch(()=>{}); }catch(e){} }
async function handleAI(W, H){
  const dbg = $("#aiDbg"); dbg.style.display = "";
  const nowMs = performance.now();
  if(aiBusy || nowMs - lastAI < AI_INTERVAL) return;
  if(!aiUrl){ dbg.textContent = "⚙설정 → AI 백엔드 주소 입력 (예: /analyze)"; return; }
  lastAI = nowMs; aiBusy = true;
  try{
    const sw = 768, sh = Math.max(1, Math.round(H * 768 / W));
    aiCanvas.width = sw; aiCanvas.height = sh; aictx.drawImage(video, 0, 0, sw, sh);
    const dataUrl = aiCanvas.toDataURL("image/jpeg", 0.7);
    const hdr = { "content-type": "application/json" }; if(aiToken) hdr["x-wg-token"] = aiToken;
    const r = await fetch(aiUrl, { method:"POST", headers:hdr, body: JSON.stringify({ image: dataUrl }) });
    const j = await r.json();
    const text = (j && j.text) || "";
    dbg.textContent = "AI: " + (text || "없음") + (j && j.error ? (" · " + j.error) : "");
    if(text && nowMs - (aiCooldown.get(text)||0) >= 4000){    // 같은 안내 4초 쿨다운
      aiCooldown.set(text, nowMs);
      showCaption({ level:2, text });
      if(j.audio) playAiAudio(j.audio); else speak({ level:2, text });   // 백엔드 음성 우선
      vibrate(2);
    }
  }catch(e){ dbg.textContent = "AI 오류: " + e.message + " (백엔드 주소/실행 확인)"; }
  finally{ aiBusy = false; }
}
let running = false, lastT = 0, frames = 0, fpsT = 0;
let stream = null;

// ---- 보행 코리도(전방 발밑 경로): 화면 하단-중앙 사다리꼴 ----
function corridor(W, H){ return { x1:0.30*W, x2:0.70*W, y1:0.45*H, y2:H }; }

// ---- 프레임차 기반 '보행 중' 추정(권한 불필요) ----
const prevSmall = document.createElement("canvas"); prevSmall.width=32; prevSmall.height=24;
const pctx = prevSmall.getContext("2d",{willReadFrequently:true});
let prevPix = null;
function estimateMoving(){
  pctx.drawImage(video,0,0,32,24);
  const cur = pctx.getImageData(0,0,32,24).data;
  if(!prevPix){ prevPix = cur.slice(0); return true; }
  let diff=0; for(let i=0;i<cur.length;i+=4){ diff += Math.abs(cur[i]-prevPix[i]); }
  prevPix = cur.slice(0);
  return (diff/(32*24)) > 6;      // 경험적 임계값
}

// ---- 계단/턱 휴리스틱(실험): 전방 하단의 강한 수평 에지 ----
// 계단=규칙적 수평선 다수, 턱=하단 뚜렷한 단일 수평에지. 깊이센서 없이 근사 → 오탐 가능(보수적 임계).
const stepCv = document.createElement("canvas"); stepCv.width=48; stepCv.height=48;
const sctx = stepCv.getContext("2d",{willReadFrequently:true});
function detectSteps(){
  const W=video.videoWidth, H=video.videoHeight; if(!W) return {};
  sctx.drawImage(video, W*0.30, H*0.55, W*0.40, H*0.45, 0,0,48,48);  // 발 앞 하단-중앙
  const d=sctx.getImageData(0,0,48,48).data;
  const g=(y,x)=>{ const i=(y*48+x)*4; return d[i]*0.3+d[i+1]*0.59+d[i+2]*0.11; };
  const rows=[];
  for(let y=0;y<47;y++){ let s=0; for(let x=0;x<48;x++) s+=Math.abs(g(y,x)-g(y+1,x)); rows.push(s/48); }
  const mx=Math.max.apply(null,rows)||1;
  let peaks=0, lastY=-5;
  for(let y=1;y<rows.length-1;y++)
    if(rows[y]>0.35*mx && rows[y]>=rows[y-1] && rows[y]>rows[y+1] && (y-lastY)>=3){ peaks++; lastY=y; }
  const env={};
  if(peaks>=3) env.stairs="front";                 // 규칙적 수평선 다수 → 계단
  else if(peaks>=1 && mx>18) env.curb="front";     // 강한 단일 수평에지 → 턱(보수적)
  return env;
}

// ---------------- 음성 (Web Speech, 한국어, 오프라인) ----------------
let koVoice = null;
function pickVoice(){
  const vs = speechSynthesis.getVoices();
  koVoice = vs.find(v=>/ko(-|_)?KR/i.test(v.lang)) || vs.find(v=>/korean|한국/i.test(v.name)) || null;
}
if("speechSynthesis" in window){ speechSynthesis.onvoiceschanged = pickVoice; pickVoice(); }
// 경보음(WebAudio) — 음성 합성이 안 되는 폰에서도 최소한의 청각 신호
let audioCtx=null;
function beep(freq,ms,vol){
  try{
    audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==="suspended") audioCtx.resume();
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.type="square"; o.frequency.value=freq; g.gain.value=vol||0.12;
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime+(ms||150)/1000);
  }catch(e){}
}
// ---- 미리 만든 한국어 음성 클립(폰에 한국어 TTS 없어도 한국어로 재생) ----
let clipMap = {}, curClip = null, clipsReady = false;
(async function loadClips(){
  try{ const m = await (await fetch("clips.json")).json();
    for(const t in m){ const a=new Audio(m[t]); a.preload="auto"; clipMap[t]=a; }
    clipsReady = Object.keys(clipMap).length>0;
  }catch(e){}
})();
function playClip(alert){
  const a = clipMap[alert.text]; if(!a) return false;
  if(alert.level===1){ if(curClip && !curClip.paused){ curClip.pause(); curClip.currentTime=0; } }
  else if(curClip && !curClip.paused && !curClip.ended) return true;   // 채널 사용중 → 하위 skip
  try{ a.currentTime=0; const p=a.play(); if(p&&p.catch) p.catch(()=>beep(alert.level===1?900:520,150)); curClip=a; return true; }
  catch(e){ return false; }
}
let lastUtterStart=0;
function speak(alert){
  if(playClip(alert)) return;                                // 1순위: 미리 만든 한국어 클립
  if(!("speechSynthesis" in window)){ beep(alert.level===1?900:520,180); return; }
  try{ speechSynthesis.resume(); }catch(e){}                 // 모바일 일시정지 버그 복구
  const now=performance.now();
  if(speechSynthesis.speaking && (now-lastUtterStart)>4000) speechSynthesis.cancel();  // 워치독
  if(alert.level===1){ speechSynthesis.cancel(); beep(900,120,0.18); }   // 즉시위험: 끊고 우선 + 경보음
  else if(speechSynthesis.speaking) return;                              // 채널 하나
  if(!koVoice) pickVoice();
  const u=new SpeechSynthesisUtterance(alert.text);
  u.lang="ko-KR"; if(koVoice) u.voice=koVoice; u.rate=1.15;
  u.onstart=()=>{ lastUtterStart=performance.now(); };
  u.onerror=()=>{ beep(alert.level===1?900:520,150); };      // 합성 실패 시 소리로라도
  lastUtterStart=now; speechSynthesis.speak(u);
}
function vibrate(level){ if(navigator.vibrate){ navigator.vibrate(level===1?[120,60,120]:[70]); } }
function ttsStatus(){
  if(clipsReady) return "한국어 음성파일 준비됨";
  const vs=("speechSynthesis"in window)?speechSynthesis.getVoices():[];
  const ko=vs.find(v=>/ko(-|_)?KR/i.test(v.lang))||vs.find(v=>/korean|한국/i.test(v.name));
  return ko?("기기음성 "+ko.name):"음성파일 로딩중…";
}

function showCaption(alert){
  // 내비게이션(방향)은 파란색으로 위험 경고와 구분
  const col = alert.nav ? "#1478e0" : ({1:"#e01e1e",2:"#e07814",3:"#d2b400",4:"#555"}[alert.level]||"#333");
  captionEl.textContent = (alert.nav?"➤ ":"") + alert.text;
  captionEl.style.background = col+"e6";
}

// ---------------- 탐지 → 스키마 변환 ----------------
function cocoToDets(preds){
  const out=[];
  for(const p of preds){
    const [x,y,w,h]=p.bbox;
    out.push({cls:p.class, conf:p.score, xyxy:[x,y,x+w,y+h]});
  }
  return tracker.update(out);
}

// ---------------- DeepLab(Cityscapes) 분석: 보행로 + 전봇대/차/사람 + 침범물 ----------------
const GROUND = new Set(["road","sidewalk","terrain"]);   // 걸을 수 있는 '바닥'(장애물 판정용)
const PED    = new Set(["sidewalk","terrain"]);          // 보행자 우선 '인도'(방향 안내용)
const SEG_OBST = {pole:"pole", person:"person", car:"car", truck:"truck",
  bus:"bus", motorcycle:"motorcycle", bicycle:"bicycle", rider:"person",
  "traffic sign":"pole", fence:"pole"};   // 표지판·펜스도 기둥성 장애물로(꼬깔콘·기둥 인식률↑)
let colorToClass = null;
function buildColorMap(legend){
  colorToClass={};
  try{ // 전체 Cityscapes 컬러맵(안정) — 프레임별 legend 는 present 클래스만 담아 누락 위험
    const cm=deeplab.getColormap("cityscapes"), lb=deeplab.getLabels("cityscapes");
    if(cm&&lb) for(let i=0;i<lb.length;i++){ const c=cm[i]; colorToClass[c[0]+","+c[1]+","+c[2]]=lb[i]; }
  }catch(e){}
  if(legend) for(const k in legend){ const c=legend[k]; colorToClass[c[0]+","+c[1]+","+c[2]]=k; }
}
function analyzeSeg(res, W, H){
  if(!colorToClass) buildColorMap(res.legend);
  const {width:sw, height:sh, segmentationMap:map}=res; // map: Uint8, 채널수 실측
  const ch=Math.max(3, Math.round(map.length/(sw*sh))); // RGB(3) 또는 RGBA(4) 대응
  const cor=corridor(1,1); // 정규화 코리도
  let corTot=0, corGround=0, corPed=0, corRoad=0;
  let navTot=0, navPed=0, navSumX=0;   // 방향안내용: 인도(sidewalk) 분포
  const boxes={}; // class -> [minx,miny,maxx,maxy] (정규화)
  const step=2;
  for(let yy=0; yy<sh; yy+=step){
    const ny=yy/sh;
    for(let xx=0; xx<sw; xx+=step){
      const i=(yy*sw+xx)*ch;
      const cls=colorToClass[map[i]+","+map[i+1]+","+map[i+2]];
      if(!cls) continue;
      const nx=xx/sw;
      // 코리도(전방 경로) 내부인가
      if(nx>=cor.x1 && nx<=cor.x2 && ny>=cor.y1){
        corTot++;
        if(GROUND.has(cls)) corGround++;
        if(cls==="sidewalk"||cls==="terrain") corPed++;
        if(cls==="road") corRoad++;
      }
      // 방향안내용 전방 넓은 밴드 — '인도'가 어디로 이어지나
      if(nx>=0.15 && nx<=0.85 && ny>=0.5){
        navTot++; if(PED.has(cls)){ navPed++; navSumX+=nx; }
      }
      // 장애물 클래스 bbox 누적(전체 프레임)
      const oc=SEG_OBST[cls];
      if(oc){ const b=boxes[oc]||(boxes[oc]=[1,1,0,0]);
        if(nx<b[0])b[0]=nx; if(ny<b[1])b[1]=ny; if(nx>b[2])b[2]=nx; if(ny>b[3])b[3]=ny; }
    }
  }
  const dets=[];
  for(const oc in boxes){ const b=boxes[oc];
    dets.push({cls:oc, conf:0.7, xyxy:[b[0]*W,b[1]*H,b[2]*W,b[3]*H]}); }
  tracker.update(dets);
  const env={};
  const groundFrac = corTot? corGround/corTot : 0;   // 코리도 바닥(인도+차도+흙) 비율
  const pedFracCor = corTot? corPed/corTot : 0;       // 코리도 인도 비율
  const roadFracCor = corTot? corRoad/corTot : 0;     // 코리도 차도 비율
  if(corTot>20 && groundFrac<0.45) env.obstacle="front";       // 바닥이 물체로 막힘 → 장애물(전봇대/꼬깔콘 등)
  else if(corTot>20 && roadFracCor>0.5 && pedFracCor<0.15) env.on_road="front"; // 앞이 차도 → 인도로
  else if(corTot>20 && pedFracCor<0.35 && roadFracCor<0.3) env.boundary=true;   // 인도 끝/벗어남
  // 방향 안내: '인도(sidewalk)' 분포로 FRONT/LEFT/RIGHT/STOP (차도는 보행경로에서 제외)
  const navPedFrac = navTot? navPed/navTot : 0;
  const navCx = navPed? navSumX/navPed : 0.5;
  const nav = { dir: L.walkDirection(navPedFrac, navCx), frac:navPedFrac, cx:navCx };
  return {dets, env, nav};
}

// ---------------- 오버레이 ----------------
function drawOverlay(dets, W, H){
  ov.width=W; ov.height=H; octx.clearRect(0,0,W,H);
  const cor=corridor(W,H);
  octx.strokeStyle="rgba(34,195,255,.6)"; octx.lineWidth=3;
  octx.beginPath(); octx.moveTo(cor.x1,cor.y1); octx.lineTo(cor.x2,cor.y1);
  octx.lineTo(cor.x2,cor.y2); octx.lineTo(cor.x1,cor.y2); octx.closePath(); octx.stroke();
  for(const d of dets){
    const [x1,y1,x2,y2]=d.xyxy;
    const band=L.geometry.proximityBand(d.xyxy,W,H);
    octx.strokeStyle = band===L.geometry.NEAR?"#e01e1e":band===L.geometry.MID?"#e07814":"#22c37a";
    octx.lineWidth=3; octx.strokeRect(x1,y1,x2-x1,y2-y1);
    octx.fillStyle=octx.strokeStyle; octx.font="16px sans-serif";
    octx.fillText(d.cls,x1+2,Math.max(14,y1-4));
  }
}

// ---------------- 메인 루프 ----------------
async function loop(){
  if(!running) return;
  const W=video.videoWidth, H=video.videoHeight;
  if(W&&H){
    const t=performance.now()/1000;
    if(mode==="ai"){                       // AI 설명 모드: 3초 간격 백엔드 분석
      handleAI(W,H); $("#mv").textContent="AI";
      frames++; if(t-fpsT>=1){ $("#fps").textContent=frames+" fps"; frames=0; fpsT=t; }
      requestAnimationFrame(loop); return;
    }
    const moving=estimateMoving();
    let dets=[], env={}, nav=null;
    if(!dangerOnly) Object.assign(env, detectSteps());   // 계단/턱은 '자세히'에서만(휴리스틱 부정확)
    try{
      if(mode==="coco" && cocoModel){
        dets = cocoToDets(await cocoModel.detect(video, 20));
      } else if(mode==="seg" && segModel){
        const res = await segModel.segment(video);
        const a = analyzeSeg(res, W, H); dets=a.dets; Object.assign(env, a.env); nav=a.nav;
      } else if(mode==="wg" && wgModel){
        dets = tracker.update(await wgModel.detect(video, W, H));   // 국내 학습 YOLOv8(onnx)
      }
    }catch(e){ statusEl.textContent="추론 오류: "+e.message; }
    let hazards = engine.process(dets, env, W, H, moving);   // moving=에고 보정에 사용
    if(dangerOnly) hazards = hazards.filter(h=>L.DANGER_KINDS.has(h.kind));  // 위험요소만
    const alerts = scheduler.feed(hazards, t, moving);
    for(const al of alerts){ showCaption(al); speak(al); vibrate(al.level); }
    // 내비게이션(방향)은 '자세히' + 내비 ON 일 때만 (위험 있으면 억제)
    if(navOn && !dangerOnly && nav){
      const navAlert = navGuide.update(nav.dir, t, {moving, hazardActive: hazards.length>0});
      if(navAlert && alerts.length===0){ showCaption(navAlert); speak(navAlert); }
      $("#mode").textContent = (mode==="coco"?"빠름":"정밀") + " ▸" + nav.dir;
    }
    drawOverlay(dets, W, H);
    $("#mv").textContent = moving?"보행중":"정지";
    frames++; if(t-fpsT>=1){ $("#fps").textContent=frames+" fps"; frames=0; fpsT=t; }
  }
  requestAnimationFrame(loop);
}

// ---------------- 깊이(WebXR/ARCore, 안드로이드 Chrome) ----------------
// CPU/GPU 두 방식 자동 대응. GPU(gpu-optimized)면 LUMINANCE_ALPHA 텍스처를 RGBA8로
// passthrough 렌더 후 readPixels → raw16=R+A*256 → meters=raw16*rawValueToMeters.
let xrSession=null, xrRef=null, xrGL=null, depthGL=null, depthUsage=null;
function xrCap(text,bg){ const e=$("#xrCap"); if(e){ e.textContent=text; e.style.background=(bg||"#e07814")+"e6"; } }
function xrDiag(t){ const e=$("#xrDiag"); if(e) e.textContent=t; }
const clamp01=v=>v<0?0:v>1?1:v;
function linkProg(gl,vsSrc,fsSrc){
  const c=(t,s)=>{ const sh=gl.createShader(t); gl.shaderSource(sh,s); gl.compileShader(sh); return sh; };
  const p=gl.createProgram(); gl.attachShader(p,c(gl.VERTEX_SHADER,vsSrc)); gl.attachShader(p,c(gl.FRAGMENT_SHADER,fsSrc)); gl.linkProgram(p); return p;
}
function setupDepthGL(gl, session, usage){
  const R={gl, binding: usage==="gpu-optimized"?new XRWebGLBinding(session,gl):null, tw:0, th:0};
  const vs="attribute vec2 aPos; attribute vec2 aUv; varying vec2 vUv; void main(){ vUv=aUv; gl_Position=vec4(aPos,0.0,1.0); }";
  const fs="precision highp float; uniform sampler2D uDepthTex; varying vec2 vUv; void main(){ vec4 s=texture2D(uDepthTex,vUv); gl_FragColor=vec4(s.r,0.0,0.0,s.a); }";
  R.prog=linkProg(gl,vs,fs); R.uLoc=gl.getUniformLocation(R.prog,"uDepthTex");
  R.aPos=gl.getAttribLocation(R.prog,"aPos"); R.aUv=gl.getAttribLocation(R.prog,"aUv");
  R.vbo=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER,R.vbo);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,0,0, 3,-1,2,0, -1,3,0,2]), gl.STATIC_DRAW); // 풀스크린 삼각형
  R.fbo=gl.createFramebuffer(); R.tgt=gl.createTexture();
  R.ensureSize=(w,h)=>{ if(w===R.tw&&h===R.th) return; R.tw=w; R.th=h;
    gl.bindTexture(gl.TEXTURE_2D,R.tgt);
    gl.texImage2D(gl.TEXTURE_2D,0,(gl.RGBA8||gl.RGBA),w,h,0,gl.RGBA,gl.UNSIGNED_BYTE,null);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.NEAREST); gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.NEAREST);
    gl.bindFramebuffer(gl.FRAMEBUFFER,R.fbo);
    gl.framebufferTexture2D(gl.FRAMEBUFFER,gl.COLOR_ATTACHMENT0,gl.TEXTURE_2D,R.tgt,0);
  };
  return R;
}
// depthInfo → (nx,ny∈[0,1] 좌상단원점)→meters|null 리더 (CPU/GPU 자동 판별)
function buildDepthReader(depthInfo){
  if(typeof depthInfo.getDepthInMeters==="function"){   // CPU 경로
    return (nx,ny)=>{ try{ const m=depthInfo.getDepthInMeters(clamp01(nx),clamp01(ny)); return (m>0&&isFinite(m))?m:null; }catch(e){ return null; } };
  }
  const d=depthInfo, gl=depthGL.gl, W=d.width, H=d.height;   // GPU 경로
  if(d.textureType==="texture-array") return ()=>null;       // 멀티뷰 미지원
  depthGL.ensureSize(W,H);
  gl.bindFramebuffer(gl.FRAMEBUFFER, depthGL.fbo); gl.viewport(0,0,W,H);
  gl.useProgram(depthGL.prog);
  gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, d.texture); gl.uniform1i(depthGL.uLoc,0);
  gl.bindBuffer(gl.ARRAY_BUFFER, depthGL.vbo);
  gl.enableVertexAttribArray(depthGL.aPos); gl.vertexAttribPointer(depthGL.aPos,2,gl.FLOAT,false,16,0);
  gl.enableVertexAttribArray(depthGL.aUv);  gl.vertexAttribPointer(depthGL.aUv,2,gl.FLOAT,false,16,8);
  gl.drawArrays(gl.TRIANGLES,0,3);
  const px=new Uint8Array(W*H*4);
  gl.readPixels(0,0,W,H,gl.RGBA,gl.UNSIGNED_BYTE,px);
  const t=d.normDepthBufferFromNormView.matrix, r2m=d.rawValueToMeters;
  return (nx,ny)=>{ nx=clamp01(nx); ny=clamp01(ny);
    const bx=t[0]*nx+t[4]*ny+t[12], by=t[1]*nx+t[5]*ny+t[13];
    const col=Math.min(Math.max(Math.floor(bx*W),0),W-1), row=Math.min(Math.max(Math.floor(by*H),0),H-1);
    const i=(col+row*W)*4, raw=px[i]+px[i+3]*256;
    if(raw===0) return null; const m=raw*r2m; return isFinite(m)?m:null;
  };
}
function sampleDepthGrid(reader){
  const rows=5, cols=5, grid=[];
  for(let r=0;r<rows;r++){ const row=[]; const ny=0.45+0.50*(r/(rows-1));
    for(let c=0;c<cols;c++){ row.push(reader(0.30+0.40*(c/(cols-1)), ny)); }
    grid.push(row);
  }
  return grid;
}
async function startDepth(){
  statusEl.textContent="깊이(실험) 준비…";
  if(!("xr" in navigator)){ statusEl.textContent="WebXR 미지원 — 안드로이드 Chrome 최신 필요(아이폰은 불가)"; return; }
  let sup=false; try{ sup=await navigator.xr.isSessionSupported("immersive-ar"); }catch(e){}
  if(!sup){ statusEl.textContent="이 폰/브라우저는 AR(immersive-ar) 미지원 — ARCore 필요"; return; }
  primeVoice();
  let sess;
  try{
    sess=await navigator.xr.requestSession("immersive-ar",{
      requiredFeatures:["depth-sensing"],
      optionalFeatures:["dom-overlay"],
      depthSensing:{usagePreference:["cpu-optimized","gpu-optimized"],dataFormatPreference:["luminance-alpha","float32"]},
      domOverlay:{root:$("#xrOverlay")}
    });
  }catch(e){ statusEl.textContent="깊이 세션 실패: "+e.message+" — 기기가 ARCore 깊이 미지원일 수 있음"; return; }
  xrSession=sess;
  const cv=document.createElement("canvas");
  xrGL = cv.getContext("webgl2",{xrCompatible:true,alpha:true}) || cv.getContext("webgl",{xrCompatible:true,alpha:true});
  try{ await xrGL.makeXRCompatible(); }catch(e){}
  sess.updateRenderState({baseLayer:new XRWebGLLayer(sess,xrGL,{alpha:true})});   // 투명 → 카메라 패스스루 보임
  depthUsage = sess.depthUsage;
  const fmt = sess.depthDataFormat || sess.depthFormat;
  depthGL = setupDepthGL(xrGL, sess, depthUsage);
  xrRef = await sess.requestReferenceSpace("local").catch(()=>sess.requestReferenceSpace("viewer"));
  $("#xrOverlay").style.display=""; navGuide.stable=null;
  xrDiag("깊이 "+depthUsage+" / "+fmt);
  let noDepth=0;
  sess.addEventListener("end", ()=>{ xrSession=null; $("#xrOverlay").style.display="none"; statusEl.textContent="깊이 종료 · "+ttsStatus(); });
  const onFrame=(tms, frame)=>{
    if(!xrSession) return;
    xrSession.requestAnimationFrame(onFrame);
    const layer=sess.renderState.baseLayer;
    if(layer){ xrGL.bindFramebuffer(xrGL.FRAMEBUFFER, layer.framebuffer); xrGL.clearColor(0,0,0,0); xrGL.clear(xrGL.COLOR_BUFFER_BIT|xrGL.DEPTH_BUFFER_BIT); }
    const pose=frame.getViewerPose(xrRef); if(!pose) return;
    const view=pose.views[0]; if(!view) return;
    let dep=null;
    try{ dep = (depthUsage==="cpu-optimized") ? frame.getDepthInformation(view) : depthGL.binding.getDepthInformation(view); }catch(e){}
    if(!dep){ if(++noDepth===45){ xrDiag("깊이 데이터 없음 · "+depthUsage); } return; }
    noDepth=0;
    try{
      const reader=buildDepthReader(dep);
      const grid=sampleDepthGrid(reader);
      const center=grid[1][2];
      xrDiag("깊이 "+depthUsage+" · 전방 "+(center!=null?center.toFixed(2)+"m":"—"));
      const hz=L.analyzeDepth(grid);
      for(const al of scheduler.feed(hz, tms/1000, true)){ xrCap(al.text, al.level===1?"#e01e1e":"#e07814"); speak(al); vibrate(al.level); }
    }catch(e){ xrDiag("깊이 처리 오류: "+e.message); }
  };
  sess.requestAnimationFrame(onFrame);
  statusEl.textContent="깊이(실험) 동작 중 — 전방 물체/턱을 실측 감지";
}

let geoWatchId=null, poiList=[], geoOn=false, lastGeo=null;
const poiAnnouncer=new L.POIAnnouncer(20);
(async function loadPOIs(){ try{ const r=await fetch("poi.json"); if(r.ok) poiList=await r.json(); }catch(e){} })();
function onGeo(pos){

}

function addTestPOI(kind){

// data.go.kr CSV(전국신호등표준데이터/음향신호기 현황) 또는 JSON 불러오기 (한글 CP949 자동)
function parseCSV(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim().length);
  const pl=line=>{ const out=[]; let cur="", q=false;
    for(let i=0;i<line.length;i++){ const ch=line[i];
      if(q){ if(ch==='"'){ if(line[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=ch; }
      else { if(ch==='"') q=true; else if(ch===',' ){ out.push(cur); cur=""; } else cur+=ch; } }
    out.push(cur); return out; };
  const rows=lines.map(pl);
  return { headers: rows[0]||[], rows: rows.slice(1) };
}
async function loadPOIFile(file){
  const buf=await file.arrayBuffer();
  let text=new TextDecoder("utf-8",{fatal:false}).decode(buf);
  if((text.match(/�/g)||[]).length>5){ try{ text=new TextDecoder("euc-kr").decode(buf); }catch(e){} } // CP949 폴백
  let added=0;
  if(/^\s*[\[{]/.test(text)){
    try{ const arr=JSON.parse(text); if(Array.isArray(arr)){ poiList.push(...arr); added=arr.length; } }
    catch(e){ statusEl.textContent="JSON 파싱 오류: "+e.message; return; }
  } else {
    const { headers, rows }=parseCSV(text);
    const { pois, error }=L.geo.rowsToPOIs(headers, rows);
    if(error){ statusEl.textContent="CSV: "+error+" (헤더에 '위도'·'경도' 필요)"; return; }
    poiList.push(...pois); added=pois.length;
  }
  poiAnnouncer.inside=new Set();
  statusEl.textContent="POI "+added+"개 불러옴 (총 "+poiList.length+"개) — '위치안내 ON'으로 사용";
}

// AI 백엔드 주소/토큰 (localStorage 저장, 키 아님)
$("#aiUrl").value=aiUrl; $("#aiToken").value=aiToken;
$("#aiUrl").oninput=e=>{ aiUrl=e.target.value.trim(); localStorage.setItem("wgAiUrl",aiUrl); };
$("#aiToken").oninput=e=>{ aiToken=e.target.value.trim(); localStorage.setItem("wgAiToken",aiToken); };
// 로컬 백엔드(local_server.py)로 열면 자동으로 AI 모드 세팅 → 그냥 탭만 하면 됨
if(/^(localhost|127\.0\.0\.1)$/.test(location.hostname)){
  if(!aiUrl){ aiUrl="/analyze"; localStorage.setItem("wgAiUrl",aiUrl); $("#aiUrl").value=aiUrl; }
  mode="ai"; $("#mode").textContent="AI";
  [...$("#modeSeg").children].forEach(x=>x.classList.remove("on"));
  const b=[...$("#modeSeg").children].find(x=>x.dataset.mode==="ai"); if(b) b.classList.add("on");
  $("#hintMain").textContent="화면을 눌러 시작 (AI)";
}

$("#start").onclick=(e)=>{ if(e&&e.stopPropagation)e.stopPropagation(); start(); };
$("#stopb").onclick=(e)=>{ if(e&&e.stopPropagation)e.stopPropagation(); stop(); };
$("#depthBtn").onclick=startDepth;
$("#xrEnd").onclick=()=>{ if(xrSession) try{ xrSession.end(); }catch(e){} };
$("#geoBtn").onclick=()=>{ if(geoOn) stopGeo(); else startGeo(); };
$("#poiAdd").onclick=()=>addTestPOI("acoustic_signal");
$("#poiLoad").onclick=()=>$("#poiFile").click();
$("#poiFile").onchange=e=>{ const f=e.target.files[0]; if(f) loadPOIFile(f); };
$("#navBtn").onclick=()=>{
  navOn=!navOn; $("#navBtn").textContent="내비 "+(navOn?"ON":"OFF");
  $("#navBtn").style.background=navOn?"#1e7a3a":"#1c2a55";
  if(navOn && mode!=="seg") statusEl.textContent="내비게이션은 '정밀 보행로' 모드에서 동작합니다.";
};
$("#dangerBtn").onclick=()=>{
  dangerOnly=!dangerOnly;
  $("#dangerBtn").textContent = dangerOnly?"위험만":"자세히";
  $("#dangerBtn").style.background = dangerOnly?"#7a2030":"#1c2a55";
  statusEl.textContent = dangerOnly?"위험요소만 안내합니다":"자세히 — 길안내·계단·점자블록 포함";
};
$("#videoBtn").onclick=()=>$("#videoFile").click();
$("#videoFile").onchange=e=>{ const f=e.target.files[0]; if(f) startVideo(f); };
$("#sound").onclick=()=>{   // 소리 테스트 + iOS 오디오 잠금 해제
  if(!koVoice) pickVoice();
  beep(660,120,0.12);
  speak({level:3, text:"소리 테스트, 걸음지기입니다"});
  statusEl.textContent="소리 테스트 — "+ttsStatus();
};
$("#modeSeg").onclick=async e=>{
  const b=e.target.closest("button[data-mode]"); if(!b) return;
  [...$("#modeSeg").children].forEach(x=>x.classList.remove("on")); b.classList.add("on");
  mode=b.dataset.mode; $("#mode").textContent = mode==="coco"?"빠름":mode==="seg"?"정밀":mode==="wg"?"국내":"AI";
  colorToClass=null;
  if(running){ statusEl.textContent="모델 전환 중…"; await ensureModel();
    statusEl.textContent="동작 중 — "+(mode==="coco"?"빠름":mode==="seg"?"정밀 보행로":mode==="wg"?"국내모델":"AI 설명");
  }
};
$("#test").onclick=()=>{
  const r=window.__selfTest();
  const ok=r.every(x=>x[1]);
  statusEl.textContent="자가검사 "+r.filter(x=>x[1]).length+"/"+r.length+(ok?" 통과":" 실패");
  console.log("selfTest", r);
};
window.__selfTest = ()=>[...L.selfTest(), ...L.selfTestNav(), ...L.selfTestDepth(), ...L.selfTestGeo(), ...L.selfTestCSV()];   // 자동 검증용

// 로딩 시 음성 가용 여부 표기(voiceschanged 후 갱신)
function refreshVoiceStatus(){ if(!running && !xrSession) statusEl.textContent = ttsStatus()+" · '시작' 또는 '동영상'"; }
if("speechSynthesis" in window) speechSynthesis.addEventListener("voiceschanged", ()=>{ pickVoice(); refreshVoiceStatus(); });
refreshVoiceStatus();
</script>
</body>
</html>
