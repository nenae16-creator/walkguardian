<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0b1020">
<title>걸음지기 — 청각 보행 보조</title>
<link rel="manifest" href="manifest.webmanifest">
<style>
  :root{--bg:#0b1020;--fg:#e8ecff;--muted:#8ea0c8;--l1:#e01e1e;--l2:#e07814;--l3:#d2b400;--l4:#7a7a7a;--accent:#22c3ff}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--fg);font-family:-apple-system,"Malgun Gothic",system-ui,sans-serif}
  #wrap{position:fixed;inset:0;display:flex;flex-direction:column}
  #stage{position:relative;flex:1;overflow:hidden;background:#000}
  #cam{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  #ov{position:absolute;inset:0;width:100%;height:100%}
  #caption{position:absolute;left:0;right:0;bottom:0;padding:18px 12px;font-size:8vw;font-weight:800;
    text-align:center;color:#fff;background:rgba(0,0,0,.55);min-height:1.4em;letter-spacing:.02em;
    text-shadow:0 2px 6px #000;transition:background .15s}
  #hud{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;
    padding:10px 12px;font-size:13px;color:var(--muted);background:linear-gradient(#000a,transparent)}
  #bar{display:flex;gap:8px;padding:10px;background:#0e1530;align-items:center;flex-wrap:wrap}
  button{font-size:16px;font-weight:700;padding:12px 16px;border-radius:12px;border:0;color:#fff;background:#1c2a55}
  button.go{background:var(--accent);color:#001526;flex:1}
  button.stop{background:#3a1030}
  .seg{display:flex;background:#0a1230;border-radius:12px;overflow:hidden}
  .seg button{background:transparent;border-radius:0;padding:12px 14px}
  .seg button.on{background:#24407a}
  #status{font-size:12px;color:var(--muted);padding:0 12px 10px}
  .chip{padding:3px 8px;border-radius:8px;background:#132043;color:var(--accent);font-weight:700}
  a{color:var(--accent)}
</style>
</head>
<body>
<div id="wrap">
  <div id="stage">
    <video id="cam" playsinline muted></video>
    <canvas id="ov"></canvas>
    <div id="hud"><span id="fps">–</span><span id="mode">빠름</span><span id="mv">–</span></div>
    <div id="caption">시작을 누르세요</div>
  </div>
  <div id="bar">
    <button id="start" class="go">▶ 시작</button>
    <button id="stopb" class="stop" style="display:none">■ 정지</button>
    <div class="seg" id="modeSeg">
      <button data-mode="coco" class="on">빠름</button>
      <button data-mode="seg">정밀 보행로</button>
    </div>
    <button id="dangerBtn" style="background:#7a2030">위험만</button>
    <button id="navBtn">내비 OFF</button>
    <button id="sound">🔊 소리</button>
    <button id="videoBtn">동영상</button>
    <input id="videoFile" type="file" accept="video/*" style="display:none">
    <button id="test">자가검사</button>
  </div>
  <div id="status">모델 로딩 대기…</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/deeplab@0.2.1/dist/deeplab.min.js"></script>
<script src="walk_logic.js"></script>
<script>
const $ = s => document.querySelector(s);
const video = $("#cam"), ov = $("#ov"), octx = ov.getContext("2d");
const captionEl = $("#caption"), statusEl = $("#status");
const L = window.WalkLogic;
const engine = new L.WalkingRiskEngine();
const scheduler = new L.AlertScheduler();
const tracker = new L.Tracker();
const navGuide = new L.NavigationGuide();
let navOn = false;
let dangerOnly = true;   // 기본: 위험요소만 (길안내·참고·부정확한 계단 등 억제)

let mode = "coco";            // coco | seg
let cocoModel = null, segModel = null;
let running = false, lastT = 0, frames = 0, fpsT = 0;
let stream = null;

// ---- 보행 코리도(전방 발밑 경로): 화면 하단-중앙 사다리꼴 ----
function corridor(W, H){ return { x1:0.30*W, x2:0.70*W, y1:0.45*H, y2:H }; }

// ---- 프레임차 기반 '보행 중' 추정(권한 불필요) ----
const prevSmall = document.createElement("canvas"); prevSmall.width=32; prevSmall.height=24;
const pctx = prevSmall.getContext("2d",{willReadFrequently:true});
let prevPix = null;
function estimateMoving(){
  pctx.drawImage(video,0,0,32,24);
  const cur = pctx.getImageData(0,0,32,24).data;
  if(!prevPix){ prevPix = cur.slice(0); return true; }
  let diff=0; for(let i=0;i<cur.length;i+=4){ diff += Math.abs(cur[i]-prevPix[i]); }
  prevPix = cur.slice(0);
  return (diff/(32*24)) > 6;      // 경험적 임계값
}

// ---- 계단/턱 휴리스틱(실험): 전방 하단의 강한 수평 에지 ----
// 계단=규칙적 수평선 다수, 턱=하단 뚜렷한 단일 수평에지. 깊이센서 없이 근사 → 오탐 가능(보수적 임계).
const stepCv = document.createElement("canvas"); stepCv.width=48; stepCv.height=48;
const sctx = stepCv.getContext("2d",{willReadFrequently:true});
function detectSteps(){
  const W=video.videoWidth, H=video.videoHeight; if(!W) return {};
  sctx.drawImage(video, W*0.30, H*0.55, W*0.40, H*0.45, 0,0,48,48);  // 발 앞 하단-중앙
  const d=sctx.getImageData(0,0,48,48).data;
  const g=(y,x)=>{ const i=(y*48+x)*4; return d[i]*0.3+d[i+1]*0.59+d[i+2]*0.11; };
  const rows=[];
  for(let y=0;y<47;y++){ let s=0; for(let x=0;x<48;x++) s+=Math.abs(g(y,x)-g(y+1,x)); rows.push(s/48); }
  const mx=Math.max.apply(null,rows)||1;
  let peaks=0, lastY=-5;
  for(let y=1;y<rows.length-1;y++)
    if(rows[y]>0.35*mx && rows[y]>=rows[y-1] && rows[y]>rows[y+1] && (y-lastY)>=3){ peaks++; lastY=y; }
  const env={};
  if(peaks>=3) env.stairs="front";                 // 규칙적 수평선 다수 → 계단
  else if(peaks>=1 && mx>18) env.curb="front";     // 강한 단일 수평에지 → 턱(보수적)
  return env;
}

// ---------------- 음성 (Web Speech, 한국어, 오프라인) ----------------
let koVoice = null;
function pickVoice(){
  const vs = speechSynthesis.getVoices();
  koVoice = vs.find(v=>/ko(-|_)?KR/i.test(v.lang)) || vs.find(v=>/korean|한국/i.test(v.name)) || null;
}
if("speechSynthesis" in window){ speechSynthesis.onvoiceschanged = pickVoice; pickVoice(); }
// 경보음(WebAudio) — 음성 합성이 안 되는 폰에서도 최소한의 청각 신호
let audioCtx=null;
function beep(freq,ms,vol){
  try{
    audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==="suspended") audioCtx.resume();
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.type="square"; o.frequency.value=freq; g.gain.value=vol||0.12;
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime+(ms||150)/1000);
  }catch(e){}
}
// ---- 미리 만든 한국어 음성 클립(폰에 한국어 TTS 없어도 한국어로 재생) ----
let clipMap = {}, curClip = null, clipsReady = false;
(async function loadClips(){
  try{ const m = await (await fetch("clips.json")).json();
    for(const t in m){ const a=new Audio(m[t]); a.preload="auto"; clipMap[t]=a; }
    clipsReady = Object.keys(clipMap).length>0;
  }catch(e){}
})();
function playClip(alert){
  const a = clipMap[alert.text]; if(!a) return false;
  if(alert.level===1){ if(curClip && !curClip.paused){ curClip.pause(); curClip.currentTime=0; } }
  else if(curClip && !curClip.paused && !curClip.ended) return true;   // 채널 사용중 → 하위 skip
  try{ a.currentTime=0; const p=a.play(); if(p&&p.catch) p.catch(()=>beep(alert.level===1?900:520,150)); curClip=a; return true; }
  catch(e){ return false; }
}
let lastUtterStart=0;
function speak(alert){
  if(playClip(alert)) return;                                // 1순위: 미리 만든 한국어 클립
  if(!("speechSynthesis" in window)){ beep(alert.level===1?900:520,180); return; }
  try{ speechSynthesis.resume(); }catch(e){}                 // 모바일 일시정지 버그 복구
  const now=performance.now();
  if(speechSynthesis.speaking && (now-lastUtterStart)>4000) speechSynthesis.cancel();  // 워치독
  if(alert.level===1){ speechSynthesis.cancel(); beep(900,120,0.18); }   // 즉시위험: 끊고 우선 + 경보음
  else if(speechSynthesis.speaking) return;                              // 채널 하나
  if(!koVoice) pickVoice();
  const u=new SpeechSynthesisUtterance(alert.text);
  u.lang="ko-KR"; if(koVoice) u.voice=koVoice; u.rate=1.15;
  u.onstart=()=>{ lastUtterStart=performance.now(); };
  u.onerror=()=>{ beep(alert.level===1?900:520,150); };      // 합성 실패 시 소리로라도
  lastUtterStart=now; speechSynthesis.speak(u);
}
function vibrate(level){ if(navigator.vibrate){ navigator.vibrate(level===1?[120,60,120]:[70]); } }
function ttsStatus(){
  if(clipsReady) return "한국어 음성파일 준비됨";
  const vs=("speechSynthesis"in window)?speechSynthesis.getVoices():[];
  const ko=vs.find(v=>/ko(-|_)?KR/i.test(v.lang))||vs.find(v=>/korean|한국/i.test(v.name));
  return ko?("기기음성 "+ko.name):"음성파일 로딩중…";
}

function showCaption(alert){
  // 내비게이션(방향)은 파란색으로 위험 경고와 구분
  const col = alert.nav ? "#1478e0" : ({1:"#e01e1e",2:"#e07814",3:"#d2b400",4:"#555"}[alert.level]||"#333");
  captionEl.textContent = (alert.nav?"➤ ":"") + alert.text;
  captionEl.style.background = col+"e6";
}

// ---------------- 탐지 → 스키마 변환 ----------------
function cocoToDets(preds){
  const out=[];
  for(const p of preds){
    const [x,y,w,h]=p.bbox;
    out.push({cls:p.class, conf:p.score, xyxy:[x,y,x+w,y+h]});
  }
  return tracker.update(out);
}

// ---------------- DeepLab(Cityscapes) 분석: 보행로 + 전봇대/차/사람 + 침범물 ----------------
const GROUND = new Set(["road","sidewalk","terrain"]);   // 걸을 수 있는 '바닥'(장애물 판정용)
const PED    = new Set(["sidewalk","terrain"]);          // 보행자 우선 '인도'(방향 안내용)
const SEG_OBST = {pole:"pole", person:"person", car:"car", truck:"truck",
  bus:"bus", motorcycle:"motorcycle", bicycle:"bicycle", rider:"person",
  "traffic sign":"pole", fence:"pole"};   // 표지판·펜스도 기둥성 장애물로(꼬깔콘·기둥 인식률↑)
let colorToClass = null;
function buildColorMap(legend){
  colorToClass={};
  try{ // 전체 Cityscapes 컬러맵(안정) — 프레임별 legend 는 present 클래스만 담아 누락 위험
    const cm=deeplab.getColormap("cityscapes"), lb=deeplab.getLabels("cityscapes");
    if(cm&&lb) for(let i=0;i<lb.length;i++){ const c=cm[i]; colorToClass[c[0]+","+c[1]+","+c[2]]=lb[i]; }
  }catch(e){}
  if(legend) for(const k in legend){ const c=legend[k]; colorToClass[c[0]+","+c[1]+","+c[2]]=k; }
}
function analyzeSeg(res, W, H){
  if(!colorToClass) buildColorMap(res.legend);
  const {width:sw, height:sh, segmentationMap:map}=res; // map: Uint8, 채널수 실측
  const ch=Math.max(3, Math.round(map.length/(sw*sh))); // RGB(3) 또는 RGBA(4) 대응
  const cor=corridor(1,1); // 정규화 코리도
  let corTot=0, corGround=0, corPed=0, corRoad=0;
  let navTot=0, navPed=0, navSumX=0;   // 방향안내용: 인도(sidewalk) 분포
  const boxes={}; // class -> [minx,miny,maxx,maxy] (정규화)
  const step=2;
  for(let yy=0; yy<sh; yy+=step){
    const ny=yy/sh;
    for(let xx=0; xx<sw; xx+=step){
      const i=(yy*sw+xx)*ch;
      const cls=colorToClass[map[i]+","+map[i+1]+","+map[i+2]];
      if(!cls) continue;
      const nx=xx/sw;
      // 코리도(전방 경로) 내부인가
      if(nx>=cor.x1 && nx<=cor.x2 && ny>=cor.y1){
        corTot++;
        if(GROUND.has(cls)) corGround++;
        if(cls==="sidewalk"||cls==="terrain") corPed++;
        if(cls==="road") corRoad++;
      }
      // 방향안내용 전방 넓은 밴드 — '인도'가 어디로 이어지나
      if(nx>=0.15 && nx<=0.85 && ny>=0.5){
        navTot++; if(PED.has(cls)){ navPed++; navSumX+=nx; }
      }
      // 장애물 클래스 bbox 누적(전체 프레임)
      const oc=SEG_OBST[cls];
      if(oc){ const b=boxes[oc]||(boxes[oc]=[1,1,0,0]);
        if(nx<b[0])b[0]=nx; if(ny<b[1])b[1]=ny; if(nx>b[2])b[2]=nx; if(ny>b[3])b[3]=ny; }
    }
  }
  const dets=[];
  for(const oc in boxes){ const b=boxes[oc];
    dets.push({cls:oc, conf:0.7, xyxy:[b[0]*W,b[1]*H,b[2]*W,b[3]*H]}); }
  tracker.update(dets);
  const env={};
  const groundFrac = corTot? corGround/corTot : 0;   // 코리도 바닥(인도+차도+흙) 비율
  const pedFracCor = corTot? corPed/corTot : 0;       // 코리도 인도 비율
  const roadFracCor = corTot? corRoad/corTot : 0;     // 코리도 차도 비율
  if(corTot>20 && groundFrac<0.45) env.obstacle="front";       // 바닥이 물체로 막힘 → 장애물(전봇대/꼬깔콘 등)
  else if(corTot>20 && roadFracCor>0.5 && pedFracCor<0.15) env.on_road="front"; // 앞이 차도 → 인도로
  else if(corTot>20 && pedFracCor<0.35 && roadFracCor<0.3) env.boundary=true;   // 인도 끝/벗어남
  // 방향 안내: '인도(sidewalk)' 분포로 FRONT/LEFT/RIGHT/STOP (차도는 보행경로에서 제외)
  const navPedFrac = navTot? navPed/navTot : 0;
  const navCx = navPed? navSumX/navPed : 0.5;
  const nav = { dir: L.walkDirection(navPedFrac, navCx), frac:navPedFrac, cx:navCx };
  return {dets, env, nav};
}

// ---------------- 오버레이 ----------------
function drawOverlay(dets, W, H){
  ov.width=W; ov.height=H; octx.clearRect(0,0,W,H);
  const cor=corridor(W,H);
  octx.strokeStyle="rgba(34,195,255,.6)"; octx.lineWidth=3;
  octx.beginPath(); octx.moveTo(cor.x1,cor.y1); octx.lineTo(cor.x2,cor.y1);
  octx.lineTo(cor.x2,cor.y2); octx.lineTo(cor.x1,cor.y2); octx.closePath(); octx.stroke();
  for(const d of dets){
    const [x1,y1,x2,y2]=d.xyxy;
    const band=L.geometry.proximityBand(d.xyxy,W,H);
    octx.strokeStyle = band===L.geometry.NEAR?"#e01e1e":band===L.geometry.MID?"#e07814":"#22c37a";
    octx.lineWidth=3; octx.strokeRect(x1,y1,x2-x1,y2-y1);
    octx.fillStyle=octx.strokeStyle; octx.font="16px sans-serif";
    octx.fillText(d.cls,x1+2,Math.max(14,y1-4));
  }
}

// ---------------- 메인 루프 ----------------
async function loop(){
  if(!running) return;
  const W=video.videoWidth, H=video.videoHeight;
  if(W&&H){
    const t=performance.now()/1000;
    const moving=estimateMoving();
    let dets=[], env={}, nav=null;
    if(!dangerOnly) Object.assign(env, detectSteps());   // 계단/턱은 '자세히'에서만(휴리스틱 부정확)
    try{
      if(mode==="coco" && cocoModel){
        dets = cocoToDets(await cocoModel.detect(video, 20));
      } else if(mode==="seg" && segModel){
        const res = await segModel.segment(video);
        const a = analyzeSeg(res, W, H); dets=a.dets; Object.assign(env, a.env); nav=a.nav;
      }
    }catch(e){ statusEl.textContent="추론 오류: "+e.message; }
    let hazards = engine.process(dets, env, W, H);
    if(dangerOnly) hazards = hazards.filter(h=>L.DANGER_KINDS.has(h.kind));  // 위험요소만
    const alerts = scheduler.feed(hazards, t, moving);
    for(const al of alerts){ showCaption(al); speak(al); vibrate(al.level); }
    // 내비게이션(방향)은 '자세히' + 내비 ON 일 때만 (위험 있으면 억제)
    if(navOn && !dangerOnly && nav){
      const navAlert = navGuide.update(nav.dir, t, {moving, hazardActive: hazards.length>0});
      if(navAlert && alerts.length===0){ showCaption(navAlert); speak(navAlert); }
      $("#mode").textContent = (mode==="coco"?"빠름":"정밀") + " ▸" + nav.dir;
    }
    drawOverlay(dets, W, H);
    $("#mv").textContent = moving?"보행중":"정지";
    frames++; if(t-fpsT>=1){ $("#fps").textContent=frames+" fps"; frames=0; fpsT=t; }
  }
  requestAnimationFrame(loop);
}

// ---------------- 시작/정지/모드 ----------------
function primeVoice(){ // iOS 오디오/음성 잠금 해제 (사용자 제스처 안 1회)
  beep(660,60,0.05);
  const c = clipMap["걸음지기 시작"];
  if(c){ try{ c.currentTime=0; const p=c.play(); if(p&&p.catch)p.catch(()=>{}); }catch(e){} }
  else if("speechSynthesis" in window){ if(!koVoice) pickVoice(); const u=new SpeechSynthesisUtterance("걸음지기 시작"); u.lang="ko-KR"; if(koVoice)u.voice=koVoice; speechSynthesis.speak(u); }
}
async function ensureModel(){
  statusEl.textContent="모델 로딩…";
  if(mode==="coco" && !cocoModel) cocoModel = await cocoSsd.load({base:"lite_mobilenet_v2"});
  if(mode==="seg" && !segModel) segModel = await deeplab.load({base:"cityscapes",quantizationBytes:2});
}
function beginLoop(label){
  navGuide.stable=null; navGuide.cand=null;
  running=true; $("#start").style.display="none"; $("#stopb").style.display="";
  statusEl.textContent="동작 중 — "+label; fpsT=performance.now()/1000; loop();
}
async function start(){       // 카메라 모드
  try{
    statusEl.textContent="카메라 여는 중…";
    stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:"environment"},width:{ideal:1280}},audio:false});
    video.srcObject=stream; video.loop=false; await video.play();
  }catch(e){ statusEl.textContent="카메라 실패: "+e.message+" (HTTPS 필요)"; return; }
  primeVoice(); await ensureModel();
  beginLoop(mode==="coco"?"빠름(객체)":"정밀 보행로(전봇대·보도)");
}
async function startVideo(file){  // 동영상 파일 모드 (PC/폰 공통, 카메라·방화벽 불필요)
  if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; }
  video.srcObject=null; video.src=URL.createObjectURL(file); video.loop=true; video.muted=true;
  primeVoice();
  try{ await video.play(); }catch(e){ statusEl.textContent="영상 재생 실패: "+e.message; return; }
  await ensureModel();
  beginLoop("동영상 테스트 — "+(mode==="coco"?"빠름":"정밀 보행로"));
}
function stop(){
  running=false;
  if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; }
  try{ video.pause(); }catch(e){}
  $("#start").style.display=""; $("#stopb").style.display="none";
  captionEl.textContent="정지됨"; captionEl.style.background="rgba(0,0,0,.55)";
  if("speechSynthesis"in window)speechSynthesis.cancel();
}

$("#start").onclick=start; $("#stopb").onclick=stop;
$("#navBtn").onclick=()=>{
  navOn=!navOn; $("#navBtn").textContent="내비 "+(navOn?"ON":"OFF");
  $("#navBtn").style.background=navOn?"#1e7a3a":"#1c2a55";
  if(navOn && mode!=="seg") statusEl.textContent="내비게이션은 '정밀 보행로' 모드에서 동작합니다.";
};
$("#dangerBtn").onclick=()=>{
  dangerOnly=!dangerOnly;
  $("#dangerBtn").textContent = dangerOnly?"위험만":"자세히";
  $("#dangerBtn").style.background = dangerOnly?"#7a2030":"#1c2a55";
  statusEl.textContent = dangerOnly?"위험요소만 안내합니다":"자세히 — 길안내·계단·점자블록 포함";
};
$("#videoBtn").onclick=()=>$("#videoFile").click();
$("#videoFile").onchange=e=>{ const f=e.target.files[0]; if(f) startVideo(f); };
$("#sound").onclick=()=>{   // 소리 테스트 + iOS 오디오 잠금 해제
  if(!koVoice) pickVoice();
  beep(660,120,0.12);
  speak({level:3, text:"소리 테스트, 걸음지기입니다"});
  statusEl.textContent="소리 테스트 — "+ttsStatus();
};
$("#modeSeg").onclick=async e=>{
  const b=e.target.closest("button[data-mode]"); if(!b) return;
  [...$("#modeSeg").children].forEach(x=>x.classList.remove("on")); b.classList.add("on");
  mode=b.dataset.mode; $("#mode").textContent = mode==="coco"?"빠름":"정밀";
  colorToClass=null;
  if(running){ statusEl.textContent="모델 전환 중…";
    if(mode==="coco" && !cocoModel) cocoModel=await cocoSsd.load({base:"lite_mobilenet_v2"});
    if(mode==="seg" && !segModel) segModel=await deeplab.load({base:"cityscapes",quantizationBytes:2});
    statusEl.textContent="동작 중 — "+(mode==="coco"?"빠름":"정밀 보행로");
  }
};
$("#test").onclick=()=>{
  const r=[...L.selfTest(), ...L.selfTestNav()];
  const ok=r.every(x=>x[1]);
  statusEl.textContent="자가검사: "+r.map(x=>x[0]+(x[1]?"✓":"✗")).join(" · ")+(ok?"  → 통과":"  → 실패");
  console.log("selfTest", r);
};
window.__selfTest = ()=>[...L.selfTest(), ...L.selfTestNav()];   // 자동 검증용

// 로딩 시 음성 가용 여부 표기(voiceschanged 후 갱신)
function refreshVoiceStatus(){ if(!running) statusEl.textContent = ttsStatus()+" · '시작' 또는 '동영상'"; }
if("speechSynthesis" in window) speechSynthesis.addEventListener("voiceschanged", ()=>{ pickVoice(); refreshVoiceStatus(); });
refreshVoiceStatus();
</script>
</body>
</html>
